<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Multiple Parson's Problems on One Page</title>
        
        <!-- Parsons CSS -->
        <link href="https://js-parsons.github.io/js/js-parsons/parsons.css" rel="stylesheet" />
        <link href="https://js-parsons.github.io/js/js-parsons/lib/prettify.css" rel="stylesheet" />
        
        <!-- Parsons Libraries -->
        <script src="https://js-parsons.github.io/js/js-parsons/lib/jquery.min.js"></script>
        <script src="https://js-parsons.github.io/js/js-parsons/lib/jquery-ui.min.js"></script>

    </head>
    <body>
        <h1>Lektion 1: Introduktion till HTML med fokus på indentering</h1>
        <h2>1. Sätt raderna i rätt ordning och med korrekt indentering.</h2>
        <div id="Lektion1_o1-sortableTrash" class="sortable-code"> </div> 
        <div id="Lektion1_o1-sortable" class="sortable-code"> </div> 
        <div style="clear:both;"> </div> 
        <p> 
            <input id="Lektion1_o1-feedbackLink" value="Få feedback" type="button"/> 
            <input id="Lektion1_o1-newInstanceLink" value="Börja om" type="button"/> 
        </p>
        <script src="ovningar/ovning1.js"></script>
        <hr/>

        <h2> 2. Sätt raderna i rätt ordning (och med korrekt indentering) så att outputet resulterar i en korrekt HTML-sida enligt bilden nedan.</h2>
        <img src="../../assets/VsTebutik.png" alt="Inklippt bild av en hemsida" style="max-width: 100%; height: auto; margin-bottom: 20px;" />
        <div id="ovning2-sortableTrash" class="sortable-code"></div> 
        <div id="ovning2-sortable" class="sortable-code"></div> 
        <div style="clear:both;"></div> 
        <p> 
            <input id="ovning2-feedbackLink" value="Få feedback" type="button" /> 
            <input id="ovning2-newInstanceLink" value="Börja om" type="button" /> 
        </p> 
        <script src="ovningar/ovning2.js"></script>    
    </body>
